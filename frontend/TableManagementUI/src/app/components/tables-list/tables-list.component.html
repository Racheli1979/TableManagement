<div class="tables-container">
  <h2>Database Tables</h2>

  <div class="search-inputs">
    <input type="text" placeholder="Global search..." [(ngModel)]="searchTermGlobal"
      (input)="onGlobalSearchInput(searchTermGlobal)" />
    <input type="text" placeholder="Filter by table name..." [(ngModel)]="searchTermTable"
      (input)="onTableSearchInput(searchTermTable)" />
  </div>

  <div *ngFor="let table of filteredTables" class="table-card">
    <div class="table-header" [class.clickable]="viewMode !== 'initial'" (click)="toggleExpand(table)">
      <strong>{{ table.tableName }}</strong>
      <span *ngIf="viewMode !== 'initial'">{{ table.expanded ? '▼' : '▶' }}</span>
    </div>

    <div *ngIf="table.expanded">
      <div class="columns-list" *ngIf="viewMode === 'tableSearch' && table === selectedTableForColumnSearch">
        <table>
          <thead>
            <tr>
              <th>Column Name</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let col of table.columns">
              <td>{{ col.columnName }}</td>
            </tr>
          </tbody>
        </table>

        <div class="column-search">
          <label>בחר עמודות לחיפוש:</label>
          <div>
            <input type="checkbox" [checked]="selectAllColumns" (change)="toggleSelectAll(table, $event)"> הכל
          </div>
          <div *ngFor="let col of table.columns">
            <input type="checkbox" [checked]="selectedColumnsForSearch.includes(col.columnName)"
              (change)="toggleColumn(col.columnName, $event)">
            {{ col.columnName }}
          </div>

          <input type="text" placeholder="Search value..." [(ngModel)]="columnSearchValue"
            (blur)="onColumnSearchInput(columnSearchValue)" />
        </div>
      </div>

      <div *ngIf="table.rowData?.length">
        <table>
          <thead>
            <tr>
              <th *ngFor="let col of getColumns(table.rowData?.[0])">{{ col }}</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let row of table.rowData">
              <td *ngFor="let col of getColumns(row)">{{ row[col] }}</td>
              <td>
                <button (click)="openEditModal(row, table)">✏️</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<app-edit-record-modal
  *ngIf="selectedRecord"
  [row]="selectedRecord"
  [columns]="selectedTableForEdit?.columns || []"
  [tableName]="selectedTableForEdit?.tableName || ''"
  (close)="selectedRecord = null">
</app-edit-record-modal>
